name: jury
on:
  push:
    branches: [ "main" ]

jobs:
    from_exploration_supposing:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: from_exploration_supposing
          run: |
            npm install
            timeout 350m node jury.js
  
