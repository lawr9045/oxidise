name: jury
on:
  push:
    branches: [ "main" ]

jobs:
    times_enrich:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: times_enrich
          run: |
            npm install
            timeout 306m node jury.js
  
