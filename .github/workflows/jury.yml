name: jury
on:
  push:
    branches: [ "main" ]

jobs:
    which:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: which
          run: |
            npm install
            timeout 327m node jury.js
  
